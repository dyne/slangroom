name: 🧪 Lint and test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🎯 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: ⏬ Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: ⏬ Install dependencies
        run: pnpm recursive install
      - name: 🏛️ Start redis server
        uses: supercharge/redis-github-action@1.8.0
        with:
          redis-version: 6
      - name: ✒️ Linting
        continue-on-error: true
        run: pnpm lint
      - name: 🤖 Start pocketbase
        run: ./pkg/pocketbase/test/pocketbase serve &
      - name: 🧪 Run the tests
        run: pnpm coverage
      - name: 📨 Setup playwright
        run: |
          npx playwright install
          npx playwright install-deps
          pnpm build
          pnpm exec playwright test
        working-directory: ./pkg/browser
      - name: 📖 Check the documentation
        run: pnpm run docs:ci

  build_docs:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🎯 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: ⏬ Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: 📖 Setup Pages
        uses: actions/configure-pages@v4
      - name: ⏬ Install dependencies
        run: pnpm install
      - name: 🏗️ Build with VitePress
        run: pnpm docs:build
      - name: ⏫ Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy_docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build_docs
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: 📡 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/main'
    steps:
    - name: 🛎️ Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: "0"
    - name: 🎯 Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        registry-url: 'https://registry.npmjs.org'
    - name: ⏬ Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8
    - name: ⏬ Install dependencies
      run: pnpm i
    - name: 🏗️ Build all
      run: pnpm build
    - name: 🏗️ Build @slangroom/browser
      run: pnpm build
      working-directory: ./pkg/browser
    - name: 📡 Release
      run: |
        git config --global user.email "dev@dyne.org" && git config --global user.name "Dev Dyne.org"
        echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" > .npmrc
        pnpm whoami
        pnpm publish:ci
      env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

